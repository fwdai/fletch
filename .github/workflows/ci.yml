name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
          version: 1.0

      - name: Setup Rust
        # Toolchain version + components come from /rust-toolchain.toml (the
        # single source of truth, shared with the release build and local dev).
        # rustup installs the pinned toolchain named there, with its components.
        run: rustup toolchain install

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rustfmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      # Deny all warnings. This includes `await_holding_lock`, the guard for the
      # concurrency invariant this codebase relies on: a lock guard must never be
      # held across a blocking wait / await (see the rule on Supervisor::agents —
      # clone the Arc out and drop the lock before child I/O).
      # `significant_drop_tightening` stays opt-out: it fires on ~44 idiomatic
      # guard-at-scope-end sites across the tree, too noisy to gate on.
      - name: Clippy
        run: >
          cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --
          -D warnings -A clippy::significant_drop_tightening

      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml
