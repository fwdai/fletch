# Single source of truth for the Rust toolchain — used by CI, the release
# build, and local dev. rustup auto-selects this in any cargo/clippy/rustc
# invocation under the repo and installs it on demand.
#
# The CI clippy gate is `-D warnings`, so a floating toolchain would let a
# future release's new lints break CI on unchanged code. Pin deliberately:
# bump `channel` here and nowhere else.
[toolchain]
channel = "1.97.0"
components = ["clippy", "rustfmt"]
